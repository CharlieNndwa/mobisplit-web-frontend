# Cap maximum memory allocation safely at 1.5GB so Windows and your tools don't starve
org.gradle.jvmargs=-Xmx1536m -Xms512m -XX:MaxMetaspaceSize=256m -XX:+UseSerialGC

# Turn off heavy parallel processing threads to prevent memory spikes
org.gradle.parallel=false
org.gradle.workers.max=1
org.gradle.configureondemand=false
org.gradle.caching=false

# Keep your required project parameters intact
android.useAndroidX=true
android.enablePngCrunchInReleaseBuilds=true
reactNativeArchitectures=armeabi-v7a,arm64-v8a,x86,x86_64
newArchEnabled=true
hermesEnabled=true
edgeToEdgeEnabled=true
expo.gif.enabled=true
expo.webp.enabled=true
expo.webp.animated=false
EX_DEV_CLIENT_NETWORK_INSPECTOR=true
expo.useLegacyPackaging=false
expo.edgeToEdgeEnabled=true
android.packagingOptions.pickFirsts=**/libcrypto.so,**/libssl.so